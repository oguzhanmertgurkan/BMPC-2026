<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BMPC 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;--blue-text:#042C53;
  --green-light:#EAF3DE;--green-text:#3B6D11;
  --amber-light:#FAEEDA;--amber-text:#854F0B;
  --coral-light:#FAECE7;--coral-text:#993C1D;
  --gray:#5F5E5A;--gray-light:#F1EFE8;--gray-text:#444441;
  --bg:#F7F8FA;--card:#fff;--border:#E2E2E2;
  --text:#1A1A1A;--text2:#555;--text3:#888;
  --nav-h:64px;--top-h:60px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh}

/* TOP BAR */
#topbar{background:var(--blue);color:#fff;padding:0 16px;height:var(--top-h);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}
#topbar h1{font-size:17px;font-weight:600;line-height:1.2}
#topbar p{font-size:11px;opacity:.75;margin-top:2px}
#agenda-clear-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:none}

/* SCROLL AREA */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--nav-h) + env(safe-area-inset-bottom) + 32px)}

/* BOTTOM NAV */
#bottomnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--text3);cursor:pointer;padding:8px 4px;font-size:10px;transition:color .15s;position:relative}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--blue);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* DAY LABEL */
.day-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 10px}

/* SPECIAL BLOCK */
.special-block{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.special-block.event{background:#EAF3DE;border-color:#C0DD97}
.special-time{font-size:11px;color:var(--text3);min-width:88px;font-weight:500}
.special-label{font-size:13px;color:var(--text);font-weight:500}
.special-block.event .special-label{color:var(--green-text)}

/* PARALLEL LABEL */
.parallel-label{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.3px;margin:14px 0 6px;padding:0 2px}

/* SESSION CARD */
.session-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.session-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.room-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.room-ist1{background:var(--blue-light);color:var(--blue-dark)}
.room-ist2{background:var(--green-light);color:var(--green-text)}
.room-yen{background:var(--amber-light);color:var(--amber-text)}
.room-har{background:var(--coral-light);color:var(--coral-text)}
.room-gen{background:var(--gray-light);color:var(--gray-text)}
.session-meta{flex:1;min-width:0}
.session-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.35}
.session-chairs{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.3}
.session-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:4px}
.sel-count{background:var(--blue);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.chevron{width:18px;height:18px;stroke:var(--text3);flex-shrink:0;transition:transform .2s;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chevron.open{transform:rotate(180deg)}

/* TALKS */
.talks-list{border-top:1px solid var(--border)}
.talk-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid #f0f0f0;user-select:none;-webkit-user-select:none}
.talk-row:last-child{border-bottom:none}
.talk-row.selected{background:#EBF3FB}
.talk-row:active{background:#f5f5f5}
.talk-row.selected:active{background:#d8eaf7}
.talk-time{font-size:11px;color:var(--text3);min-width:85px;padding-top:2px;line-height:1.3}
.talk-body{flex:1;min-width:0}
.talk-title{font-size:13px;line-height:1.4;color:var(--text)}
.talk-row.selected .talk-title{color:var(--blue-dark)}
.talk-author{font-size:11px;color:var(--text3);margin-top:3px}
.talk-row.selected .talk-author{color:var(--blue);opacity:.7}
.check-circle{width:22px;height:22px;flex-shrink:0;margin-top:1px}

/* AGENDA */
.agenda-empty{text-align:center;padding:60px 24px}
.agenda-empty-icon{width:56px;height:56px;margin:0 auto 16px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.4}
.agenda-empty h2{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px}
.agenda-empty p{font-size:13px;color:var(--text3);line-height:1.5}
.agenda-count{font-size:11px;color:var(--text3);margin:4px 0 12px}
.agenda-day-group{margin-bottom:16px}
.agenda-day-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding:0 2px}
.agenda-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.agenda-card-body{flex:1;min-width:0}
.agenda-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.agenda-pill{font-size:10px;padding:2px 8px;border-radius:20px}
.agenda-title{font-size:13px;line-height:1.4;font-weight:500;color:var(--text)}
.agenda-authors{font-size:11px;color:var(--text3);margin-top:3px}
.remove-btn{background:none;border:1px solid #fcc;color:#c0392b;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;flex-shrink:0;margin-top:1px}

/* SEARCH BAR */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:#fff;color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}

@media(prefers-color-scheme:dark){
  :root{--bg:#111;--card:#1e1e1e;--border:#333;--text:#f0f0f0;--text2:#bbb;--text3:#777}
  #topbar{background:#0d3b6e}
  #bottomnav{background:#1e1e1e;border-top-color:#333}
  .special-block{background:#1e1e1e}
  .special-block.event{background:#0d2a1a;border-color:#1e5c35}
  .session-card{background:#1e1e1e}
  .talk-row:active{background:#2a2a2a}
  .talk-row.selected{background:#0d2a45}
  .talk-row.selected:active{background:#0a2236}
  .agenda-card{background:#1e1e1e}
  .search-wrap input{background:#1e1e1e;color:#f0f0f0}
  .room-ist1{background:#0d2a45;color:#85B7EB}
  .room-ist2{background:#0d2a1a;color:#97C459}
  .room-yen{background:#2a1f08;color:#EF9F27}
  .room-har{background:#2a1008;color:#F0997B}
  .room-gen{background:#2a2a2a;color:#B4B2A9}
}
</style>
</head>

      Apr 9
    </button>

<script>
const SEL_KEY = 'bmpc_selected';
let selected = new Set(JSON.parse(localStorage.getItem(SEL_KEY)||'[]'));
let currentDay = 0;
let expanded = new Set();

function saveSelected(){localStorage.setItem(SEL_KEY,JSON.stringify([...selected]));}

function roomClass(r){
  if(r==='Istanbul-1') return 'room-ist1';
  if(r==='Istanbul-2') return 'room-ist2';
  if(r==='Yeniköy') return 'room-yen';
  if(r==='Harem') return 'room-har';
  return 'room-gen';
}
function roomPillStyle(r){
  if(r==='Istanbul-1') return 'background:#E6F1FB;color:#0C447C';
  if(r==='Istanbul-2') return 'background:#EAF3DE;color:#3B6D11';
  if(r==='Yeniköy') return 'background:#FAEEDA;color:#854F0B';
  if(r==='Harem') return 'background:#FAECE7;color:#993C1D';
  return 'background:#F1EFE8;color:#444441';
}

function checkSVG(sel){
  return sel
    ? `<svg class="check-circle" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#185FA5" stroke="#185FA5" stroke-width="1.5"/><polyline points="7,12 10.5,15.5 17,8.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    : `<svg class="check-circle" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#ccc" stroke-width="1.5"/></svg>`;
}

function toggle(id){
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  saveSelected();
  updateBadge();
  renderDay(currentDay);
}

function updateBadge(){
  const b=document.getElementById('agenda-badge');
  const n=document.getElementById('nav3-label');
  if(selected.size>0){
    b.style.display='flex'; b.textContent=selected.size;
  } else {
    b.style.display='none';
  }
  document.getElementById('agenda-clear-btn').style.display=
    (currentDay===3 && selected.size>0)?'block':'none';
}

function clearAgenda(){
  if(!confirm('Remove all saved sessions?')) return;
  selected.clear(); saveSelected(); updateBadge(); renderDay(3);
}

function setDay(d){
  currentDay=d;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===d));
  document.getElementById('agenda-clear-btn').style.display=
    (d===3 && selected.size>0)?'block':'none';
  document.getElementById('content').scrollTop=0;
  renderDay(d);
}

function toggleExpand(key){
  if(expanded.has(key)) expanded.delete(key); else expanded.add(key);
  renderDay(currentDay);
  if(expanded.has(key)){
    setTimeout(()=>{
      const cards=document.querySelectorAll('.session-card');
      for(const c of cards){
        if(c.querySelector('.talks-list')){
          const rect=c.getBoundingClientRect();
          if(rect.top>=0 && rect.top<window.innerHeight){
            c.scrollIntoView({behavior:'smooth',block:'nearest'});
          }
        }
      }
    },50);
  }
}

const DAY_NAMES = ['Thursday, April 9','Friday, April 10','Saturday, April 11'];

  return {day,id,time,title,authors:authors||'',room:room||'',session:session||''};

function renderDay(d){
  const el=document.getElementById('content');
  if(d===3){renderAgenda(el);return;}
  const items=DAYS[d];
  let h=`<div class="day-label">${DAY_NAMES[d]}</div>`;
  for(const item of items){
    if(item.type==='special'){
      h+=`<div class="special-block${item.event?' event':''}"><span class="special-time">${item.time||''}</span><span class="special-label">${item.label}</span></div>`;
    } else if(item.type==='session'){
      for(const s of item.sessions) h+=renderSession(s,d);
    } else if(item.type==='parallel'){
      h+=`<div class="parallel-label">Parallel sessions &middot; ${item.time}</div>`;
      for(const s of item.sessions) h+=renderSession(s,d);
    }
  }
  el.innerHTML=h;
}

function renderSession(s,d){
  const key=`${d}_${s.room}_${s.title}`;
  const open=expanded.has(key);
  const selCount=s.talks.filter(t=>selected.has(t.id)).length;
  let h=`<div class="session-card">`;
  h+=`<div class="session-header" onclick="toggleExpand('${key.replace(/'/g,"\\'")}')">`;
  h+=`<div><span class="room-badge ${roomClass(s.room)}">${s.room}</span></div>`;
  h+=`<div class="session-meta"><div class="session-title">${s.title}</div>`;
  if(s.chairs) h+=`<div class="session-chairs">${s.chairs}</div>`;
  h+=`</div><div class="session-header-right">`;
  if(selCount>0) h+=`<span class="sel-count">${selCount}</span>`;
  h+=`<svg class="chevron${open?' open':''}" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>`;
  h+=`</div></div>`;
  if(open){
    h+=`<div class="talks-list">`;
    for(const t of s.talks){
      const sel=selected.has(t.id);
      h+=`<div class="talk-row${sel?' selected':''}" onclick="toggle('${t.id}')">`;
      h+=`<span class="talk-time">${t.time}</span>`;
      h+=`<div class="talk-body"><div class="talk-title">${t.title}</div>`;
      if(t.authors) h+=`<div class="talk-author">${t.authors}</div>`;
      h+=`</div>${checkSVG(sel)}</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

function getAllTalks(){
  const all=[];
  for(const day of DAYS) for(const item of day){
    const sessions=item.sessions||[];
    for(const s of sessions) for(const t of s.talks) all.push(t);
  }
  return all;
}

function renderAgenda(el){
  const all=getAllTalks();
  const saved=all.filter(t=>selected.has(t.id)).sort((a,b)=>a.day-b.day||a.time.localeCompare(b.time));
  if(saved.length===0){
    el.innerHTML=`<div class="agenda-empty">
      <svg class="agenda-empty-icon" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <h2>No sessions saved</h2>
      <p>Browse the schedule and tap any talk to save it to your agenda.</p>
    </div>`;
    return;
  }
  let h=`<div class="agenda-count">${saved.length} session${saved.length!==1?'s':''} saved</div>`;
  let lastDay=-1;
  for(const t of saved){
    if(t.day!==lastDay){
      if(lastDay>=0) h+=`</div>`;
      h+=`<div class="agenda-day-group"><div class="agenda-day-title">${DAY_NAMES[t.day]}</div>`;
      lastDay=t.day;
    }
    const ps=roomPillStyle(t.room);
    h+=`<div class="agenda-card">`;
    h+=`<div class="agenda-card-body">`;
    h+=`<div class="agenda-pills">`;
    h+=`<span class="agenda-pill" style="${ps}">${t.time}</span>`;
    if(t.room) h+=`<span class="agenda-pill" style="${ps}">${t.room}</span>`;
    h+=`</div>`;
    h+=`<div class="agenda-title">${t.title}</div>`;
    if(t.authors) h+=`<div class="agenda-authors">${t.authors}</div>`;
    h+=`</div>`;
    h+=`<button class="remove-btn" onclick="toggle('${t.id}')">Remove</button>`;
    h+=`</div>`;
  }
  if(lastDay>=0) h+=`</div>`;
  el.innerHTML=h;
}
